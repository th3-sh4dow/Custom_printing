<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - Custom Printing Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <a href="index.html">
          <span class="logo-icon"><i class="fa-solid fa-print"></i></span>
          <span class="logo-text">Custom<span class="orange">Printing</span>Hub</span>
        </a>
      </div>
      <div class="header-actions">
        <a href="cart.html" class="cart-icon"><i class="fa-solid fa-cart-shopping"></i><span class="cart-count" id="cartCount">0</span></a>
      </div>
    </div>
  </header>

  <a href="https://wa.me/919142927996" target="_blank" class="whatsapp-float">
    <i class="fa-brands fa-whatsapp"></i><span>Order on WhatsApp</span>
  </a>

  <div class="checkout-page">
    <h2 class="page-heading">Checkout</h2>
    <div class="checkout-layout">
      <!-- DELIVERY FORM -->
      <div class="checkout-form-section">
        <h3>Delivery Address</h3>
        <form id="checkoutForm">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="fullName" placeholder="Enter your full name" required/>
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com"/>
          </div>
          <div class="form-group">
            <label>Address *</label>
            <textarea id="address" placeholder="House No, Street, Area" rows="3" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City *</label>
              <input type="text" id="city" placeholder="City" required/>
            </div>
            <div class="form-group">
              <label>State *</label>
              <input type="text" id="state" placeholder="State" required/>
            </div>
            <div class="form-group">
              <label>PIN Code *</label>
              <input type="text" id="pincode" placeholder="PIN Code" required/>
            </div>
          </div>

          <h3 style="margin-top:24px">Payment Method</h3>
          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="cod" checked/>
              <span><i class="fa-solid fa-money-bill-wave"></i> Cash on Delivery</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="upi"/>
              <span><i class="fa-solid fa-mobile-screen"></i> UPI / PhonePe / GPay</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="whatsapp"/>
              <span><i class="fa-brands fa-whatsapp"></i> Pay via WhatsApp</span>
            </label>
          </div>

          <div class="whatsapp-note">
            <i class="fa-brands fa-whatsapp"></i>
            <strong>Important:</strong> After placing your order, please send your design image to WhatsApp: <strong>+91 91429 27996</strong>
          </div>
        </form>
      </div>

      <!-- ORDER SUMMARY -->
      <div class="checkout-summary" id="checkoutSummary">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 Custom Printing Hub | WhatsApp: +91 91429 27996</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
